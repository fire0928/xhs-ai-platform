server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: xhs-server
  profiles:
    active: dev
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

  # MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/xhs_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: Xhs@2024!secure
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      connection-init-sql: SET NAMES utf8mb4

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password: XhsRedis@2024
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
      timeout: 5000ms

  # File Upload
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # Quartz
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
    properties:
      org:
        quartz:
          scheduler:
            instanceName: XhsScheduler
            instanceId: AUTO
          threadPool:
            threadCount: 10

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT
jwt:
  secret: XhsJwtSecretKey2024Secure256bit!!ForHS256
  expiration: 604800000  # 7 days
  refresh-expiration: 2592000000  # 30 days

# MinIO
minio:
  endpoint: http://localhost:9000
  access-key: xhs_admin
  secret-key: XhsMinio@2024
  bucket-name: xhs-files
  img-bucket: xhs-images

# AES Encryption
aes:
  key: XhsAES256Key!!@2024Secure

# AI Service (configurable via admin panel)
ai:
  default-model: gpt-4o
  timeout: 30000

# Publishing Engine
publish:
  engine-url: http://localhost:8001
  max-retry: 2
  retry-interval-minutes: 5

# Knife4j
knife4j:
  enable: true

# Logging
logging:
  level:
    com.hongshu: DEBUG
    org.springframework.security: INFO
