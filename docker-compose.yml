version: '3.8'

services:
  # MySQL 8.0 主数据库
  mysql:
    image: mysql:8.0
    container_name: xhs-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Xhs@2024!secure
      MYSQL_DATABASE: xhs_db
      MYSQL_USER: xhs_user
      MYSQL_PASSWORD: Xhs@2024!user
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./server/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xhs-net

  # Redis 7.x
  redis:
    image: redis:7-alpine
    container_name: xhs-redis
    restart: always
    command: redis-server --requirepass XhsRedis@2024 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - xhs-net

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: xhs-minio
    restart: always
    environment:
      MINIO_ROOT_USER: xhs_admin
      MINIO_ROOT_PASSWORD: XhsMinio@2024
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - xhs-net

  # Spring Boot 后端服务
  xhs-server:
    build:
      context: ./server/xhs-server
      dockerfile: Dockerfile
    container_name: xhs-server
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: xhs_db
      DB_USER: xhs_user
      DB_PASS: Xhs@2024!user
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: XhsRedis@2024
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: xhs_admin
      MINIO_SECRET_KEY: XhsMinio@2024
      JWT_SECRET: XhsJwtSecretKey2024!@#$
      AES_KEY: XhsAES256Key!!@2024Secure
    ports:
      - "8080:8080"
    networks:
      - xhs-net

  # Python 发布引擎
  publish-engine:
    build:
      context: ./publish-engine
      dockerfile: Dockerfile
    container_name: xhs-publish-engine
    restart: always
    depends_on:
      - redis
      - xhs-server
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: XhsRedis@2024
      SERVER_URL: http://xhs-server:8080
      CHROME_DEBUG_PORT: 9222
    ports:
      - "8001:8001"
    volumes:
      - browser-data:/app/browser_data
      - /tmp/.X11-unix:/tmp/.X11-unix
    shm_size: '2gb'
    networks:
      - xhs-net

  # Nginx 反向代理
  nginx:
    image: nginx:1.25-alpine
    container_name: xhs-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - xhs-server
      - publish-engine
    networks:
      - xhs-net

networks:
  xhs-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  minio-data:
  browser-data:
